<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Cumpleaños</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#000;
    color:white;
    text-align:center;
}

.container{
    max-width:500px;
    margin:auto;
}

/* IMAGEN PRINCIPAL */
.hero{
    width:100%;
}

/* GALERIA */
.gallery{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
}

.gallery img{
    height:150px;
    border-radius:10px;
}

/* BOTONES */
.buttons{
    position:fixed;
    bottom:10px;
    width:100%;
    max-width:500px;
    display:flex;
    gap:10px;
    padding:10px;
}

button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
}

.map{background:#4CAF50;color:white;}
.wa{background:#25D366;color:white;}
</style>
</head>

<body>

<div class="container">

<!-- 🔥 TU FOTO PRINCIPAL -->
<img src="1.png" class="hero">

<!-- 📸 GALERIA -->
<div class="gallery">
    <img src="2.png">
    <img src="3.png">
    <img src="4.png">
</div>

</div>

<!-- 🔘 BOTONES -->
<div class="buttons">
    <button class="map" onclick="irMapa()">📍 Ubicación</button>
    <button class="wa" onclick="irWhatsApp()">💬 Confirmar</button>
</div>

<script>

/* 📍 GOOGLE MAPS */
function irMapa(){
    window.open("https://maps.app.goo.gl/9MVH4WbjdRik2xXS7","_blank");
}

/* 💬 WHATSAPP */
function irWhatsApp(){
    let mensaje = "Hola! Confirmo mi asistencia al cumpleaños 🎉";
    let url = "https://wa.me/595981011531?text=" + encodeURIComponent(mensaje);
    window.open(url,"_blank");
}

</script>

</body>
</html>
