<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cumpleaños de Eithan</title>

<!-- FUENTES PRO -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins', sans-serif;
    background:#0b1d0b;
    color:white;
}

/* SECCIONES MÁS COMPACTAS */
section{
    padding:40px 15px;
    text-align:center;
}

/* HERO PRO */
.hero{
    height:100vh;
    background:url("1.jpg") center/cover no-repeat;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0.3));
}

.hero h1{
    z-index:2;
    font-size:28px;
    font-weight:600;
}

.hero p{
    z-index:2;
    opacity:0.8;
}

/* TITULOS */
h2{
    font-family:'Great Vibes', cursive;
    font-size:32px;
    color:#f4d35e;
}

/* TEXTO */
p{
    margin-top:10px;
    font-size:14px;
    opacity:0.9;
}

/* ANIMACIÓN */
.fade{
    opacity:0;
    transform:translateY(30px);
    transition:0.8s;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

/* CONTADOR PRO */
.countdown{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:15px;
}

.countdown div{
    background:rgba(255,255,255,0.08);
    padding:10px;
    border-radius:10px;
    min-width:60px;
}

.countdown span{
    font-size:20px;
    font-weight:bold;
}

.countdown p{
    font-size:10px;
}

/* GALERÍA PRO NIVEL APP */
.gallery{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
    scroll-snap-type:x mandatory;
}

.gallery::-webkit-scrollbar{
    display:none;
}

.gallery img{
    height:180px;
    border-radius:15px;
    flex:0 0 70%;
    object-fit:cover;
    scroll-snap-align:center;
    transition:0.3s;
}

.gallery img:active{
    transform:scale(1.05);
}

/* BOTONES PRO */
button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:30px;
    font-size:14px;
    font-weight:600;
}

.map{
    background:#4CAF50;
    color:white;
}

.wa{
    background:#25D366;
    color:white;
}

/* OVERLAY PRO */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.enter{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    font-size:16px;
}

/* RESPONSIVE EXTRA */
@media(min-width:768px){
    .gallery img{
        flex:0 0 30%;
    }
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
    <h2>🌴 Bienvenido</h2>
    <button class="enter" onclick="entrar()">Entrar</button>
</div>

<!-- HERO -->
<section class="hero">
    <h1 class="fade">🎉 Cumpleaños de Eithan</h1>
    <p class="fade">Una aventura en la jungla 🌿</p>
</section>

<!-- INFO -->
<section>
    <h2 class="fade">Estás Invitado</h2>
    <p class="fade">Ven a celebrar mi 1 añito 🎂</p>

    <div class="countdown fade">
        <div><span id="days"></span><p>Días</p></div>
        <div><span id="hours"></span><p>Horas</p></div>
        <div><span id="minutes"></span><p>Min</p></div>
        <div><span id="seconds"></span><p>Seg</p></div>
    </div>
</section>

<!-- GALERÍA -->
<section>
    <div class="gallery fade">
        <img src="2.jpg">
        <img src="3.jpg">
        <img src="4.jpg">
        <img src="5.jpg">
        <img src="6.jpg">
        <img src="7.jpg">
    </div>
</section>

<!-- UBICACIÓN -->
<section>
    <h2 class="fade">Ubicación</h2>
    <button class="map fade" onclick="mapa()">📍 Ver en Maps</button>
</section>

<!-- WHATSAPP -->
<section>
    <h2 class="fade">Confirmar</h2>
    <button class="wa fade" onclick="wa()">💬 Confirmar asistencia</button>
</section>

<!-- AUDIO -->
<audio id="audio" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let audio = document.getElementById("audio");

/* ENTRADA */
function entrar(){
    document.getElementById("overlay").style.display="none";
    audio.play();
}

/* ANIMACIONES */
let faders = document.querySelectorAll(".fade");

window.addEventListener("scroll", ()=>{
    faders.forEach(el=>{
        if(el.getBoundingClientRect().top < window.innerHeight - 50){
            el.classList.add("show");
        }
    });
});

/* MAPA */
function mapa(){
    window.open("https://maps.app.goo.gl/9MVH4WbjdRik2xXS7");
}

/* WHATSAPP */
function wa(){
    window.open("https://wa.me/595981011531?text=Confirmo mi asistencia 🎉");
}

/* CONTADOR */
const fechaEvento = new Date("2026-06-24 18:00:00").getTime();

setInterval(()=>{
    let ahora = new Date().getTime();
    let diff = fechaEvento - ahora;

    document.getElementById("days").innerText = Math.floor(diff/(1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((diff/(1000*60*60))%24);
    document.getElementById("minutes").innerText = Math.floor((diff/(1000*60))%60);
    document.getElementById("seconds").innerText = Math.floor((diff/1000)%60);
},1000);

/* PAUSA MUSICA */
window.addEventListener("blur",()=>audio.pause());
window.addEventListener("beforeunload",()=>audio.pause());
</script>

</body>
</html>
